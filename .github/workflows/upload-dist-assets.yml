name: Upload cargo-dist assets to an existing tag

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to upload assets to (e.g. v0.2.0)"
        required: true
        default: "v0.2.0"
      ref:
        description: "Git ref to build from (e.g. v0.2.0, main). Use main to backfill old tags."
        required: true
        default: "main"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build dist artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-musl
          - os: windows-latest
            targets: x86_64-pc-windows-msvc
          - os: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-dist
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/axodotdev/cargo-dist/releases/download/v0.30.3/cargo-dist-installer.sh \
            | sh

      - name: Install Linux musl tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl

      - name: Install macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build archives
        shell: bash
        run: |
          IFS=',' read -ra TARGETS <<< "${{ matrix.targets }}"
          for t in "${TARGETS[@]}"; do
            cargo dist build --artifacts=local --tag "${{ inputs.tag }}" --target "$t"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: target/distrib/

  upload:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist-artifacts
          merge-multiple: true

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            dist-artifacts/**
