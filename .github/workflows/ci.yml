name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test / Lint / Fmt
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Clippy (workspace defaults)
      run: cargo clippy --workspace --all-targets -- -D warnings

    - name: Clippy (async)
      run: |
        cargo clippy -p unity-asset-core --all-targets --features async -- -D warnings
        cargo clippy -p unity-asset-yaml --all-targets --features async -- -D warnings
        cargo clippy -p unity-asset-binary --all-targets --features async -- -D warnings
        cargo clippy -p unity-asset --all-targets --features async -- -D warnings
        cargo clippy -p unity-asset-cli --all-targets --features async -- -D warnings

    - name: Clippy (decode/export)
      run: |
        cargo clippy -p unity-asset-decode --all-targets --features full -- -D warnings
        cargo clippy -p unity-asset-cli --all-targets --features decode -- -D warnings

    - name: Test CLI tools
      run: |
        cargo build --workspace
        ./target/debug/unity-asset --help
        cargo build -p unity-asset-cli --features async
        ./target/debug/unity-asset-async --help
        cargo build -p unity-asset-cli --features decode

    - name: Build examples
      run: |
        cargo build -p unity-asset --examples
        cargo build -p unity-asset-binary --examples
        cargo build -p unity-asset-decode --examples --features full

    - name: Run tests (workspace defaults)
      run: cargo nextest run --workspace

    - name: Run tests (async)
      run: |
        cargo nextest run -p unity-asset --features async
        cargo nextest run -p unity-asset-cli --features async

    - name: Run tests (decode/export)
      run: cargo nextest run -p unity-asset-decode --features full

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable

    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2

    - name: Check documentation
      run: cargo doc --all --all-features --no-deps

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Rust 1.85.0
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: 1.85.0
    - name: Cache dependencies
      uses: Swatinem/rust-cache@v2
    - name: Build workspace
      run: cargo build --workspace



  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: rustsec/audit-check@v2
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
